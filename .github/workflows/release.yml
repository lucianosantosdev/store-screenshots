name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'  # allow pre-releases like v0.2.0-rc1

# Only one publish at a time, even if multiple tags get pushed back-to-back.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
      ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
      ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_SIGNING_KEY }}
      ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.GPG_KEY_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "RELEASE_VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Releasing version $VERSION"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # vanniktech's publishToMavenCentral uploads a bundle to the Central Portal and,
      # because automaticRelease=true is set in each module, releases it automatically.
      - name: Publish to Maven Central
        run: |
          ./gradlew \
            :library:publishToMavenCentral \
            :plugin:publishToMavenCentral \
            -Pversion=${{ env.RELEASE_VERSION }} \
            --no-daemon --stacktrace

      - name: Publish to GitHub Packages
        run: |
          ./gradlew \
            :library:publishMavenPublicationToGitHubPackagesRepository \
            :plugin:publishPluginMavenPublicationToGitHubPackagesRepository \
            -Pversion=${{ env.RELEASE_VERSION }} \
            --no-daemon --stacktrace
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        if: success()
        run: |
          echo "### Published $RELEASE_VERSION :rocket:" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Artifacts:" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`io.github.lucianosantosdev:storescreenshots-library:$RELEASE_VERSION\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`io.github.lucianosantosdev:storescreenshots-plugin:$RELEASE_VERSION\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Plugin id: \`io.github.lucianosantosdev.storescreenshots\` version \`$RELEASE_VERSION\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Published to: Maven Central, GitHub Packages" >> "$GITHUB_STEP_SUMMARY"
