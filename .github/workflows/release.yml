name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'  # allow pre-releases like v0.2.0-rc1

# Only one publish at a time, even if multiple tags get pushed back-to-back.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "RELEASE_VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Releasing version $VERSION"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Publish to GitHub Packages
        run: |
          ./gradlew \
            :library:publishReleasePublicationToGitHubPackagesRepository \
            :plugin:publishAllPublicationsToGitHubPackagesRepository \
            -Pversion=${{ env.RELEASE_VERSION }} \
            --no-daemon --stacktrace
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        if: success()
        run: |
          echo "### Published $RELEASE_VERSION to GitHub Packages :rocket:" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Artifacts:" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`dev.lucianosantos:storescreenshots-library:$RELEASE_VERSION\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`dev.lucianosantos:storescreenshots-plugin:$RELEASE_VERSION\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Plugin id: \`dev.lucianosantos.storescreenshots\` version \`$RELEASE_VERSION\`" >> "$GITHUB_STEP_SUMMARY"
