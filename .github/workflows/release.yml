name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'  # allow pre-releases like v0.2.0-rc1

# Only one publish at a time, even if multiple tags get pushed back-to-back.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "RELEASE_VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Releasing version $VERSION"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Publish to GitHub Packages
        run: |
          ./gradlew \
            :library:publishReleasePublicationToGitHubPackagesRepository \
            :plugin:publishPluginMavenPublicationToGitHubPackagesRepository \
            -Pversion=${{ env.RELEASE_VERSION }} \
            --no-daemon --stacktrace
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GPG_SIGNING_KEY: ${{ secrets.GPG_SIGNING_KEY }}
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}

      - name: Publish to Maven Central
        run: |
          ./gradlew \
            :library:publishReleasePublicationToMavenCentralRepository \
            :plugin:publishPluginMavenPublicationToMavenCentralRepository \
            -Pversion=${{ env.RELEASE_VERSION }} \
            --no-daemon --stacktrace
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          GPG_SIGNING_KEY: ${{ secrets.GPG_SIGNING_KEY }}
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}

      # The Gradle upload above lands in an "open" staging repo on the OSSRH compatibility
      # API. Promote it so it validates and auto-publishes to Maven Central.
      - name: Release deployment on Central Portal
        run: |
          BASE="https://ossrh-staging-api.central.sonatype.com"
          TOKEN=$(printf '%s:%s' "$MAVEN_CENTRAL_USERNAME" "$MAVEN_CENTRAL_PASSWORD" | base64 -w0)
          KEY=$(curl -fsS -H "Authorization: Bearer $TOKEN" \
            "$BASE/manual/search/repositories?profile_id=io.github.lucianosantosdev&state=open" \
            | jq -r '.repositories[0].key')
          if [ -z "$KEY" ] || [ "$KEY" = "null" ]; then
            echo "No open staging repository found to promote." >&2
            exit 1
          fi
          echo "Promoting staging repository: $KEY"
          ENCODED_KEY=$(jq -rn --arg k "$KEY" '$k|@uri')
          curl -fsS -X POST -H "Authorization: Bearer $TOKEN" \
            "$BASE/manual/upload/repository/$ENCODED_KEY?publishing_type=automatic"
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}

      - name: Summary
        if: success()
        run: |
          echo "### Published $RELEASE_VERSION :rocket:" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Artifacts:" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`io.github.lucianosantosdev:storescreenshots-library:$RELEASE_VERSION\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`io.github.lucianosantosdev:storescreenshots-plugin:$RELEASE_VERSION\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Plugin id: \`dev.lucianosantos.storescreenshots\` version \`$RELEASE_VERSION\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Published to: GitHub Packages, Maven Central" >> "$GITHUB_STEP_SUMMARY"
